<div class="admin-login-wrapper">
  <div class="admin-login-card">

    <h1>Daisy Peralta</h1>
    <p class="subtitulo">Acceso al panel de administración</p>

    <div class="campo">
      <label>Correo</label>
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="tu@correo.com"
        (keyup.enter)="login()">
    </div>

    <div class="campo">
      <label>Contraseña</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        (keyup.enter)="login()">
    </div>

    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

    <button class="btn-login" (click)="login()" [disabled]="cargando">
      {{ cargando ? 'Entrando...' : 'Entrar' }}
    </button>

  </div>
</div>
