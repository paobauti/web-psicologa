<div class="admin-shell">

  <!-- ───────────── Sidebar ───────────── -->
  <aside class="sidebar">

    <div class="logo">
      <span class="logo-icono">✦</span>
      <div>
        <h1>Daisy Peralta</h1>
        <p>Catholic Psychotherapist &amp; Life Coach</p>
      </div>
    </div>

    <nav class="nav-links">
      <a routerLink="/admin/home" routerLinkActive="activo">🏠 Home</a>
      <a routerLink="/admin/citas" routerLinkActive="activo">🗓 Citas</a>
      <a routerLink="/admin/mensajes" routerLinkActive="activo">💬 Mensajes</a>
      <a routerLink="/admin/pacientes" routerLinkActive="activo">👥 Pacientes</a>
      <a routerLink="/admin/servicios" routerLinkActive="activo">📋 Servicios</a>
      <a routerLink="/admin/recursos" routerLinkActive="activo">📖 Recursos</a>
    </nav>

    <button class="btn-cerrar-sesion" (click)="pedirCerrarSesion()">
      ⎋ Cerrar sesión
    </button>

  </aside>

  <!-- ───────────── Contenido ───────────── -->
  <main class="contenido">
    <router-outlet></router-outlet>
  </main>

  <!-- ───────────── Modal: confirmar cerrar sesión ───────────── -->
  <div class="modal-overlay" *ngIf="mostrarConfirmarSalir" (click)="cancelarCerrarSesion()">
    <div class="modal-contenido" (click)="$event.stopPropagation()">
      <h2>¿Cerrar sesión?</h2>
      <p>Tendrás que volver a iniciar sesión para acceder al panel.</p>
      <div class="modal-acciones">
        <button class="btn-secundario" (click)="cancelarCerrarSesion()">Cancelar</button>
        <button class="btn-eliminar" (click)="confirmarCerrarSesion()">Cerrar sesión</button>
      </div>
    </div>
  </div>

</div>
