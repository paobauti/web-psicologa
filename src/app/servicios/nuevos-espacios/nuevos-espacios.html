<section class="nuevos-espacios">

  <!-- Servicios activos — reutiliza el componente life-coach -->
  <app-life-coach 
    *ngFor="let servicio of serviciosActivos" 
    [servicioInput]="servicio">
  </app-life-coach>

  <!-- Servicios próximamente -->
  <div *ngIf="serviciosProximos.length > 0">
    <p class="soon">✦ MÁS PRONTO ✦</p>
    <h2>Nuevos Espacios de Acompañamiento</h2>
    <div class="espacios-grid">
      <div class="espacio-card" *ngFor="let servicio of serviciosProximos">
        <i [class]="getIcono(servicio.nombre)"></i>
        <h3>{{ servicio.nombre }}</h3>
        <p>{{ servicio.descripcion }}</p>
        <button class="btn-soon">🔒 Próximamente</button>
      </div>
    </div>
  </div>

</section>
