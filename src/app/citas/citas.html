<app-page-hero
  titulo="Citas"
  descripcion="Agenda tu cita para brindarte el apoyo que necesitas."
  imagen="https://nxgkvvykypfntdmgwhsl.supabase.co/storage/v1/object/sign/Imagenes/img_citas.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV80NjdlNGRiNS03MjFhLTRjZDgtYWM1Ny0wNjE0ZDI0YzQzNjEiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJJbWFnZW5lcy9pbWdfY2l0YXMucG5nIiwiaWF0IjoxNzgwNTU0NjY4LCJleHAiOjE4MTIwOTA2Njh9.fPWi9ikL1s_hk6p35MpcSkxDDWGz7oQ4OomcbRfpZ9A">
</app-page-hero>

<div class="citas-content">
  <div class="calendario-card">
    <h3>Selecciona una fecha:</h3>
    <full-calendar [options]="calendarOptions"></full-calendar>
  </div>

  <div class="form-card">
    <h3>Datos Personales</h3>
    <div class="form-group">
      <input type="text" placeholder="Nombre y Apellidos" class="form-input" [(ngModel)]="nombre">
    </div>
    <div class="form-group">
      <input type="email" placeholder="Correo Electrónico" class="form-input" [(ngModel)]="email">
    </div>
    <div class="form-group">
      <select class="form-input" [(ngModel)]="tipoSesion">
        <option value="">Tipo de Sesión</option>
        <option value="Life Coach">Life Coach</option>
        <option value="Terapia Individual" disabled>Terapia Individual (Próximamente)</option>
        <option value="Terapia de Pareja" disabled>Terapia de Pareja (Próximamente)</option>
        <option value="Terapia Familiar" disabled>Terapia Familiar (Próximamente)</option>
        <option value="Terapia de Grupo" disabled>Terapia de Grupo (Próximamente)</option>
      </select>
    </div>
    <div class="horarios" *ngIf="fechaSeleccionada">
      <h3>Selecciona un horario disponible:</h3>

      <p class="cargando-msg" *ngIf="cargandoHorarios">Cargando horarios...</p>

      <select class="form-input" [(ngModel)]="horarioSeleccionado" *ngIf="!cargandoHorarios">
        <option value="">Selecciona un horario</option>
        <option
          *ngFor="let horario of horarios"
          [value]="horario.hora"
          [disabled]="estaOcupado(horario.hora)">
          {{ horario.hora | slice:0:5 }}{{ estaOcupado(horario.hora) ? ' — Ocupado' : '' }}
        </option>
      </select>
    </div>
    <div class="form-group">
      <textarea placeholder="Temas a tratar..." class="form-textarea" [(ngModel)]="temas"></textarea>
    </div>
    <button class="btn-agendar" (click)="agendarCita()">Agendar Cita</button>
  </div>
</div>

<!-- ─── MODAL ÉXITO ─── -->
<div class="modal-overlay" *ngIf="exitoMsg" (click)="cerrarExito()">
  <div class="modal-cita" (click)="$event.stopPropagation()">
    <div class="modal-icono exito">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>
    <h2>¡Cita agendada!</h2>
    <p>Tu cita ha sido registrada correctamente. Te esperamos.</p>
    <div class="modal-cita-footer">
      <button class="btn-modal-secundario" (click)="cerrarExito()">Cerrar</button>
      <a class="btn-modal-principal" routerLink="/perfil">Ver mis citas</a>
    </div>
  </div>
</div>

<!-- ─── MODAL ERROR ─── -->
<div class="modal-overlay" *ngIf="errorMsg" (click)="cerrarError()">
  <div class="modal-cita" (click)="$event.stopPropagation()">
    <div class="modal-icono error">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <h2>Algo salió mal</h2>
    <p>{{ errorMsg }}</p>
    <div class="modal-cita-footer">
      <button class="btn-modal-principal" (click)="cerrarError()">Intentar de nuevo</button>
    </div>
  </div>
</div>
