<div class="citas-form">
  <h3>Datos Personales</h3>
  <div class="form-group">
    <input type="text" placeholder="Nombre y Apellidos" class="form-input">
  </div>
  <div class="form-group">
    <input type="email" placeholder="Correo Electrónico" class="form-input">
  </div>
  <div class="form-group">
    <input type="tel" placeholder="Teléfono / WhatsApp" class="form-input">
  </div>
  <div class="form-group">
    <select class="form-input">
      <option value="">Tipo de Sesión</option>
      <option value="life-coach">Life Coach</option>
      <option value="individual">Terapia Individual</option>
      <option value="pareja">Terapia de Pareja</option>
      <option value="familiar">Terapia Familiar</option>
      <option value="grupo">Terapia de Grupo</option>
    </select>
  </div>
  <div class="form-group">
    <textarea placeholder="Temas a tratar..." class="form-textarea"></textarea>
  </div>
  <button class="btn-agendar">Agendar Cita</button>
</div>
