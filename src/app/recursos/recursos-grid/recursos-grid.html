<section class="recursos-grid">
  <div class="articulo-card" *ngFor="let recurso of recursos">
    <a [routerLink]="['/recursos', recurso.id]" class="card-link">
      <div class="articulo-imagen">
        <img [src]="recurso.imagen_url || 'https://placehold.co/400x160'" [alt]="recurso.titulo">
        <span class="categoria" [ngClass]="recurso.categoria === 'Fe y Espiritualidad' ? 'fe' : recurso.categoria === 'Salud emocional' ? 'salud' : recurso.categoria === 'Bienestar' ? 'bienestar' : 'crecimiento'">
          {{ recurso.categoria }}
        </span>
      </div>
      <h3>{{ recurso.titulo }}</h3>
      <p>{{ recurso.descripcion }}</p>
    </a>
  </div>
</section>
